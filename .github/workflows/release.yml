name: Release

# Triggered when you push a version tag: git tag v1.2.3 && git push --tags
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # create GitHub Releases
  packages: write   # push to GHCR

jobs:
  build-and-release:
    name: Build images · Push to GHCR · Create Release
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source code ───────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for release notes

      # ── 2. Docker Buildx (multi-platform + layer caching) ────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. Log in to GitHub Container Registry ───────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 4. Lowercase owner (GHCR requires lowercase image paths) ─────────────
      - name: Compute lowercase owner
        id: owner
        run: echo "lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      # ── 5. Build & push API image ─────────────────────────────────────────────
      - name: Build & push — API (Django + Daphne)
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/ondes-host-api:${{ github.ref_name }}
            ghcr.io/${{ steps.owner.outputs.lc }}/ondes-host-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      # ── 6. Build & push App image ─────────────────────────────────────────────
      - name: Build & push — App (Flutter web)
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/ondes-host-app:${{ github.ref_name }}
            ghcr.io/${{ steps.owner.outputs.lc }}/ondes-host-app:latest
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      # ── 7. Create GitHub Release with auto-generated notes ────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## ⚡ Deploy to your VPS — one command

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/deploy.sh | sudo bash
            ```

            > **That's it.** Fresh Ubuntu/Debian/RHEL/Rocky/Fedora VPS → running dashboard in minutes.
            > Pre-built images are pulled automatically from GHCR — **no Git clone, no build step on the server.**

            ---

            ## 🐳 Docker images — `${{ github.ref_name }}`

            | Service | Image |
            |---------|-------|
            | API (Django + Daphne) | `ghcr.io/${{ steps.owner.outputs.lc }}/ondes-host-api:${{ github.ref_name }}` |
            | App (Flutter web)     | `ghcr.io/${{ steps.owner.outputs.lc }}/ondes-host-app:${{ github.ref_name }}` |

            Pull them manually:

            ```bash
            docker pull ghcr.io/${{ steps.owner.outputs.lc }}/ondes-host-api:${{ github.ref_name }}
            docker pull ghcr.io/${{ steps.owner.outputs.lc }}/ondes-host-app:${{ github.ref_name }}
            ```

            To force a local build from source instead of pulling:

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/deploy.sh \
              | sudo ONDES_BUILD=1 bash
            ```
